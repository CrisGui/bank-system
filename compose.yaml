  db:
    build:
      context: db
      target: builder
    restart: always
    secrets:
      - db-password
    networks:
      - db-private
    volumes:
      - ./db:/data
  core:
    build:
      context: core
      target: builder
    restart: always
    volumes:
      - db-data:/data/db
    secrets:
      - db-password
    networks:
      - db-private
    depends_on:
      - db

volumes:
  db-data:
secrets:
  db-password:
    file: db/db-password.txt
networks:
  db-private:
